<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>权力的游戏 — 人情世故闯关</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');

:root {
  --bg: #0a0a0a;
  --text: #e8e4de;
  --muted: #6b6560;
  --accent-w: #c9a96e;
  --accent-m: #8b4513;
  --card-bg: rgba(255,255,255,0.03);
  --card-border: rgba(255,255,255,0.06);
  --danger: #c45c4a;
  --success: #6b8f71;
  --glass: rgba(255,255,255,0.04);
  --glass-border: rgba(255,255,255,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', 'Noto Serif SC', sans-serif;
  overflow-x: hidden;
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content:'';
  position:fixed; top:0; left:0; width:100%; height:100%;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9999;
}

#particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
#cursorGlow { position:fixed; width:300px; height:300px; border-radius:50%; pointer-events:none; z-index:1; background:radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 70%); transform:translate(-50%,-50%); transition:opacity 0.3s; }

.screen { display:none; min-height:100vh; position:relative; z-index:2; }
.screen.active { display:flex; flex-direction:column; }

/* ====== LANDING ====== */
#landing { align-items:center; justify-content:center; text-align:center; padding:2rem; }

#landing h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(2.5rem, 6vw, 5rem);
  font-weight:900; letter-spacing:0.1em; margin-bottom:0.5rem;
  background: linear-gradient(135deg, var(--text), var(--accent-w));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation: fadeUp 1.2s ease-out;
}

#landing .subtitle {
  font-size: clamp(0.9rem, 2vw, 1.2rem);
  color: var(--muted); margin-bottom:2rem;
  animation: fadeUp 1.2s ease-out 0.3s both; font-style:italic;
}

#landing .book-tags {
  display:flex; gap:0.5rem; flex-wrap:wrap; justify-content:center;
  margin-bottom:3rem; animation: fadeUp 1.2s ease-out 0.5s both;
}
.book-tag {
  padding:0.3rem 0.8rem; font-size:0.65rem; letter-spacing:0.1em;
  border:1px solid var(--glass-border); color:var(--muted);
  background:var(--glass); border-radius:2px;
}

.divider-line { width:60px; height:1px; background:var(--muted); margin:0 auto 3rem; animation: fadeUp 1.2s ease-out 0.6s both; }

.choice-cards { display:flex; gap:2rem; flex-wrap:wrap; justify-content:center; animation: fadeUp 1.2s ease-out 0.7s both; }

.choice-card {
  width:360px; padding:3rem 2rem;
  background: var(--card-bg); border:1px solid var(--card-border);
  cursor:pointer; transition: all 0.5s cubic-bezier(0.23,1,0.32,1);
  position:relative; overflow:hidden;
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
}
.choice-card::before {
  content:''; position:absolute; top:0; left:0; width:100%; height:2px;
  background: linear-gradient(90deg, transparent, var(--accent-w), transparent);
  transform:scaleX(0); transition:transform 0.5s ease;
}
.choice-card:hover::before { transform:scaleX(1); }
.choice-card:hover { background: rgba(255,255,255,0.06); transform:translateY(-4px); border-color: rgba(255,255,255,0.12); }

.choice-card .card-era { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.3em; color:var(--accent-w); margin-bottom:1.5rem; }
.choice-card h2 { font-family:'Noto Serif SC', serif; font-size:1.6rem; font-weight:700; margin-bottom:1rem; line-height:1.4; }
.choice-card p { font-size:0.85rem; color:var(--muted); line-height:1.7; }
.choice-card .card-icon { font-size:2.5rem; margin-bottom:1rem; display:block; }
.choice-card .card-stats { margin-top:1.5rem; padding-top:1rem; border-top:1px solid var(--glass-border); }
.choice-card .card-stat { display:flex; justify-content:space-between; font-size:0.7rem; color:var(--muted); margin-bottom:0.3rem; }

/* save/load bar */
.save-bar {
  position:fixed; bottom:1.5rem; right:1.5rem; z-index:100;
  display:flex; gap:0.5rem; opacity:0; animation: fadeUp 1s ease-out 1s both;
}
.save-btn {
  padding:0.5rem 1rem; background:var(--glass); border:1px solid var(--glass-border);
  color:var(--muted); font-size:0.7rem; letter-spacing:0.1em; cursor:pointer;
  transition:all 0.3s ease; font-family:'Inter',sans-serif;
}
.save-btn:hover { color:var(--text); border-color:var(--accent-w); }

/* ====== GAME SCREEN ====== */
#game-screen { padding:0; }

.game-header {
  position:fixed; top:0; left:0; width:100%;
  padding:1.5rem 2rem; display:flex; justify-content:space-between; align-items:center;
  z-index:100; background: linear-gradient(180deg, var(--bg) 60%, transparent);
}
.game-header .scenario-label { font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--accent-w); }
.game-header .level-indicator { font-size:0.75rem; color:var(--muted); letter-spacing:0.15em; }
.game-header .back-btn {
  position:absolute; top:1.5rem; right:2rem; padding:0.4rem 1rem;
  background:transparent; border:1px solid var(--glass-border); color:var(--muted);
  font-size:0.7rem; cursor:pointer; transition:all 0.3s; font-family:'Inter',sans-serif;
}
.game-header .back-btn:hover { color:var(--text); border-color:var(--accent-w); }

.stats-bar {
  position:fixed; top:60px; left:0; width:100%;
  padding:0.8rem 2rem; display:flex; gap:2rem; justify-content:center;
  z-index:100; background: linear-gradient(180deg, rgba(10,10,10,0.95) 60%, transparent);
  opacity:0; transition:opacity 0.5s;
}
.stats-bar.visible { opacity:1; }

.stat-item { display:flex; align-items:center; gap:0.5rem; font-size:0.65rem; letter-spacing:0.08em; }
.stat-label { color:var(--muted); }
.stat-value { font-weight:700; min-width:20px; text-align:center; transition: color 0.3s; font-size:0.7rem; }
.stat-bar { width:50px; height:2px; background: rgba(255,255,255,0.1); position:relative; overflow:hidden; }
.stat-bar-fill { position:absolute; top:0; left:0; height:100%; transition: width 0.8s cubic-bezier(0.23,1,0.32,1); }

.scene-container {
  flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
  padding:8rem 2rem 4rem; max-width:720px; margin:0 auto; min-height:100vh;
}

.scene-chapter {
  font-size:0.65rem; letter-spacing:0.4em; text-transform:uppercase;
  color:var(--accent-w); margin-bottom:2rem;
  opacity:0; transform:translateY(20px);
}

.scene-text {
  font-family:'Noto Serif SC', serif;
  font-size: clamp(1rem, 2.5vw, 1.2rem); line-height:2.2;
  color:var(--text); margin-bottom:2.5rem;
  opacity:0; transform:translateY(20px);
}
.scene-text .highlight { color:var(--accent-w); border-bottom:1px solid rgba(201,169,110,0.3); }
.scene-text .danger { color:var(--danger); }

.scene-narrator {
  font-size:0.8rem; color:var(--muted); font-style:italic;
  margin-bottom:2rem; opacity:0; transform:translateY(20px);
  padding:1rem 1.5rem; border-left:2px solid var(--glass-border);
  background:var(--glass); position:relative;
}

.choices-container { width:100%; opacity:0; transform:translateY(30px); }

.choice-btn {
  width:100%; padding:1.2rem 1.5rem; margin-bottom:0.6rem;
  background: var(--card-bg); border:1px solid var(--card-border);
  color:var(--text); font-family:'Noto Serif SC', serif;
  font-size:0.95rem; text-align:left; cursor:pointer;
  transition:all 0.4s cubic-bezier(0.23,1,0.32,1);
  position:relative; overflow:hidden; display:block;
  backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px);
}
.choice-btn::after {
  content:''; position:absolute; top:0; left:0; width:3px; height:100%;
  background:var(--accent-w); transform:scaleY(0); transition:transform 0.3s ease;
}
.choice-btn:hover::after { transform:scaleY(1); }
.choice-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); transform:translateX(8px); }
.choice-btn:active { transform:translateX(8px) scale(0.98); }

.choice-btn .choice-hint {
  display:block; font-family:'Inter', sans-serif;
  font-size:0.7rem; color:var(--muted); margin-top:0.5rem; font-style:italic;
  max-height:0; overflow:hidden; transition:max-height 0.5s ease;
}
.choice-btn:hover .choice-hint { max-height:100px; }

/* long press tooltip */
.choice-btn .deep-analysis {
  display:none; position:absolute; bottom:100%; left:0; width:100%;
  padding:1rem; background:rgba(10,10,10,0.95); border:1px solid var(--accent-w);
  font-family:'Inter',sans-serif; font-size:0.75rem; color:var(--accent-w);
  line-height:1.6; z-index:10; pointer-events:none;
}
.choice-btn .deep-analysis.show { display:block; animation: fadeUp 0.3s ease; }

/* consequence display */
.consequence-box {
  margin-top:2rem; padding:1.5rem; background:var(--glass);
  border:1px solid var(--glass-border); border-left:3px solid var(--accent-w);
  opacity:0; transform:translateY(20px);
}
.consequence-box .consequence-label {
  font-size:0.65rem; letter-spacing:0.3em; text-transform:uppercase;
  color:var(--accent-w); margin-bottom:0.8rem;
}
.consequence-box .consequence-text {
  font-family:'Noto Serif SC',serif; font-size:0.9rem; line-height:1.8; color:var(--text);
}

/* stat change popup */
.stat-change-popup {
  position:fixed; top:50%; right:2rem; transform:translateY(-50%);
  z-index:200; display:flex; flex-direction:column; gap:0.3rem;
}
.stat-change-item {
  padding:0.3rem 0.8rem; font-size:0.7rem; letter-spacing:0.05em;
  background:rgba(10,10,10,0.9); border:1px solid var(--glass-border);
  opacity:0; transform:translateX(20px);
  animation: statPopIn 0.5s ease forwards;
}
.stat-change-item.positive { color:var(--success); border-color:rgba(107,143,113,0.3); }
.stat-change-item.negative { color:var(--danger); border-color:rgba(196,92,74,0.3); }

@keyframes statPopIn {
  to { opacity:1; transform:translateX(0); }
}

/* result flash */
.result-flash {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-family:'Noto Serif SC', serif; font-size:1.3rem;
  color:var(--accent-w); pointer-events:none; z-index:200; opacity:0;
  text-align:center; max-width:500px; padding:2rem;
  background:rgba(10,10,10,0.9); border:1px solid var(--glass-border);
}

/* ====== ENDING SCREEN ====== */
#ending-screen { align-items:center; justify-content:center; text-align:center; padding:4rem 2rem; }

.ending-badge {
  width:80px; height:80px; border-radius:50%; margin:0 auto 2rem;
  display:flex; align-items:center; justify-content:center;
  font-size:2rem; border:2px solid var(--accent-w);
  animation: fadeUp 0.8s ease-out 0.2s both;
}

.ending-title {
  font-family:'Noto Serif SC', serif;
  font-size:clamp(2rem, 5vw, 3.5rem); font-weight:900; margin-bottom:0.5rem;
  background: linear-gradient(135deg, var(--text), var(--accent-w));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  opacity:0; animation: fadeUp 1s ease-out 0.4s both;
}

.ending-subtitle {
  font-size:1rem; color:var(--muted); margin-bottom:2.5rem;
  opacity:0; animation: fadeUp 1s ease-out 0.6s both;
}

.ending-stats {
  display:flex; gap:2rem; justify-content:center; flex-wrap:wrap;
  margin-bottom:2.5rem; opacity:0; animation: fadeUp 1s ease-out 0.8s both;
}
.ending-stat { text-align:center; min-width:80px; }
.ending-stat .val { font-size:2rem; font-weight:700; font-family:'Noto Serif SC', serif; }
.ending-stat .lbl { font-size:0.65rem; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase; }

.ending-verdict {
  max-width:600px; font-family:'Noto Serif SC', serif;
  font-size:1rem; line-height:2; margin:0 auto 2rem;
  opacity:0; animation: fadeUp 1s ease-out 1s both;
  text-align:left; padding:1.5rem; background:var(--glass); border:1px solid var(--glass-border);
}

.ending-analysis {
  max-width:600px; font-size:0.8rem; color:var(--muted); line-height:1.8;
  margin:0 auto 2rem; text-align:left; padding:1.5rem;
  background:var(--glass); border:1px solid var(--glass-border);
  opacity:0; animation: fadeUp 1s ease-out 1.2s both;
}
.ending-analysis h4 { color:var(--accent-w); font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:0.8rem; }
.ending-analysis .book-ref { color:var(--accent-w); font-style:italic; }

.ending-quote {
  font-style:italic; color:var(--muted); font-size:0.85rem;
  margin-bottom:3rem; opacity:0; animation: fadeUp 1s ease-out 1.4s both;
}

.ending-btns {
  display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;
  opacity:0; animation: fadeUp 1s ease-out 1.6s both;
}
.ending-btn {
  padding:0.8rem 2rem; background:transparent; border:1px solid var(--card-border);
  color:var(--text); font-family:'Noto Serif SC', serif; font-size:0.9rem;
  cursor:pointer; transition:all 0.4s ease;
}
.ending-btn:hover { background:rgba(255,255,255,0.06); border-color:var(--accent-w); }
.ending-btn.primary { border-color:var(--accent-w); }

/* ====== ENDING GALLERY ====== */
#gallery-screen { align-items:center; padding:4rem 2rem; }
.gallery-header {
  text-align:center; margin-bottom:3rem;
}
.gallery-header h2 {
  font-family:'Noto Serif SC',serif; font-size:2rem; font-weight:700; margin-bottom:0.5rem;
  background: linear-gradient(135deg, var(--text), var(--accent-w));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.gallery-header p { color:var(--muted); font-size:0.85rem; }

.gallery-tabs { display:flex; gap:1rem; margin-bottom:2rem; }
.gallery-tab {
  padding:0.5rem 1.5rem; background:transparent; border:1px solid var(--glass-border);
  color:var(--muted); font-size:0.8rem; cursor:pointer; transition:all 0.3s;
  font-family:'Inter',sans-serif;
}
.gallery-tab.active { color:var(--accent-w); border-color:var(--accent-w); }

.gallery-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:1.5rem; width:100%; max-width:900px; }
.gallery-card {
  padding:1.5rem; background:var(--glass); border:1px solid var(--glass-border);
  transition:all 0.3s ease; cursor:default;
}
.gallery-card.locked { opacity:0.3; }
.gallery-card.unlocked { border-color:var(--accent-w); }
.gallery-card:hover { transform:translateY(-2px); }
.gallery-card .gc-icon { font-size:1.5rem; margin-bottom:0.8rem; }
.gallery-card .gc-title { font-family:'Noto Serif SC',serif; font-size:1.1rem; font-weight:700; margin-bottom:0.3rem; }
.gallery-card .gc-subtitle { font-size:0.75rem; color:var(--muted); margin-bottom:0.8rem; }
.gallery-card .gc-quote { font-size:0.7rem; color:var(--muted); font-style:italic; }

.gallery-back {
  margin-top:3rem; padding:0.8rem 2rem; background:transparent;
  border:1px solid var(--card-border); color:var(--text);
  font-family:'Noto Serif SC',serif; font-size:0.9rem; cursor:pointer; transition:all 0.4s;
}
.gallery-back:hover { border-color:var(--accent-w); }

/* ====== ANIMATIONS ====== */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(30px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes blink { 50% { opacity:0; } }
@keyframes glitch {
  0% { transform:translate(0); }
  20% { transform:translate(-2px, 2px); }
  40% { transform:translate(2px, -2px); }
  60% { transform:translate(-1px, -1px); }
  80% { transform:translate(1px, 1px); }
  100% { transform:translate(0); }
}
@keyframes pulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }
@keyframes scanline { 0% { top:-100%; } 100% { top:100%; } }

.typewriter-cursor {
  display:inline-block; width:2px; height:1em;
  background:var(--accent-w); margin-left:2px;
  animation: blink 1s step-end infinite; vertical-align:text-bottom;
}

.transition-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:var(--bg); z-index:500; opacity:0; pointer-events:none;
  transition:opacity 0.4s ease;
}
.transition-overlay.active { opacity:1; pointer-events:all; }

.scanline-effect {
  position:fixed; top:0; left:0; width:100%; height:100%;
  pointer-events:none; z-index:50; opacity:0; transition:opacity 0.5s;
}
.scanline-effect.active { opacity:1; }
.scanline-effect::before {
  content:''; position:absolute; left:0; width:100%; height:4px;
  background:rgba(139,69,19,0.08); animation: scanline 4s linear infinite;
}

.vignette {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
  pointer-events:none; z-index:3; opacity:0; transition:opacity 1s;
}
.vignette.active { opacity:1; }

.ink-splash {
  position:fixed; width:200px; height:200px; border-radius:50%;
  background:radial-gradient(circle, rgba(139,69,19,0.15), transparent 70%);
  pointer-events:none; z-index:2; animation: inkSpread 2s ease-out forwards;
}
@keyframes inkSpread {
  0% { transform:scale(0); opacity:1; }
  100% { transform:scale(4); opacity:0; }
}

.glitch-text { position:relative; }
.glitch-text::before, .glitch-text::after {
  content:attr(data-text); position:absolute; top:0; left:0; width:100%; height:100%;
}
.glitch-text::before {
  color:var(--danger); clip-path:polygon(0 0, 100% 0, 100% 45%, 0 45%);
  animation:glitch 0.3s ease-in-out;
}
.glitch-text::after {
  color:var(--accent-w); clip-path:polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
  animation:glitch 0.3s ease-in-out 0.05s;
}

/* confetti */
.confetti-container { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:300; overflow:hidden; }
.confetti {
  position:absolute; width:8px; height:8px; top:-10px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform:translateY(0) rotate(0deg); opacity:1; }
  100% { transform:translateY(100vh) rotate(720deg); opacity:0; }
}

/* dark atmosphere for bad endings */
.atmosphere-dark {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:radial-gradient(ellipse at center, rgba(80,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%);
  pointer-events:none; z-index:300; animation: fadeIn 2s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

/* ====== RESPONSIVE ====== */
@media (max-width:768px) {
  .choice-cards { flex-direction:column; align-items:center; }
  .choice-card { width:100%; max-width:360px; }
  .stats-bar { gap:0.8rem; flex-wrap:wrap; padding:0.6rem 1rem; }
  .stat-label { display:none; }
  .ending-stats { gap:1.2rem; }
  .game-header { padding:1rem; }
  .scene-container { padding:6rem 1.5rem 3rem; }
  .stat-change-popup { right:1rem; }
  .save-bar { bottom:1rem; right:1rem; }
  .gallery-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>
<div id="cursorGlow"></div>
<div class="transition-overlay" id="transitionOverlay"></div>
<div class="vignette" id="vignette"></div>
<div class="scanline-effect" id="scanline"></div>
<div class="result-flash" id="resultFlash"></div>

<!-- ====== LANDING ====== -->
<div class="screen active" id="landing">
  <h1>权 力 的 游 戏</h1>
  <p class="subtitle">"所有命运赠送的礼物，早已在暗中标好了价格"</p>
  <div class="book-tags">
    <span class="book-tag">《沧浪之水》</span>
    <span class="book-tag">《白宫幕僚》</span>
    <span class="book-tag">《权力的道路》</span>
    <span class="book-tag">《乡土中国》</span>
    <span class="book-tag">《置身事内》</span>
  </div>
  <div class="divider-line"></div>
  <div class="choice-cards">
    <div class="choice-card" onclick="startGame('whitehouse')">
      <span class="card-icon">🏛️</span>
      <div class="card-era">Chapter I — 当代</div>

// ====== PARTICLE SYSTEM ======
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 1.5 + 0.3;
    this.speedY = -(Math.random() * 0.3 + 0.05);
    this.speedX = (Math.random() - 0.5) * 0.2;
    this.opacity = Math.random() * 0.4 + 0.1;
    this.life = Math.random() * 200 + 100;
    this.maxLife = this.life;
  }
  update() {
    this.x += this.speedX; this.y += this.speedY; this.life--;
    if (this.life <= 0 || this.y < -10) this.reset();
  }
  draw() {
    const alpha = this.opacity * (this.life / this.maxLife);
    ctx.fillStyle = `rgba(201,169,110,${alpha})`;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
  }
}
for (let i = 0; i < 60; i++) particles.push(new Particle());
function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ====== GAME ENGINE ======
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'game-screen') {
    document.getElementById('statsBar').classList.add('visible');
  } else {
    document.getElementById('statsBar').classList.remove('visible');
  }
}

function startGame(scenario) {
  state = { scenario, currentScene:0, stats:{}, choices:[], history:[] };
  const sc = scenarios[scenario];
  sc.stats.forEach(s => state.stats[s.key] = s.value);

  const overlay = document.getElementById('transitionOverlay');
  overlay.classList.add('active');
  setTimeout(() => {
    showScreen('game-screen');
    document.getElementById('scenarioLabel').textContent = sc.label;
    document.getElementById('vignette').classList.toggle('active', scenario === 'ming');
    document.getElementById('scanline').classList.toggle('active', scenario === 'ming');
    renderStats();
    renderScene();
    setTimeout(() => overlay.classList.remove('active'), 100);
  }, 600);
}

function renderStats() {
  const sc = scenarios[state.scenario];
  const bar = document.getElementById('statsBar');
  bar.innerHTML = sc.stats.map(s => `
    <div class="stat-item">
      <span class="stat-label">${s.label}</span>
      <span class="stat-value" id="sv-${s.key}" style="color:${s.color}">${state.stats[s.key]}</span>
      <div class="stat-bar">
        <div class="stat-bar-fill" id="sb-${s.key}" style="width:${state.stats[s.key]}%;background:${s.color}"></div>
      </div>
    </div>
  `).join('');
  setTimeout(() => bar.classList.add('visible'), 300);
}

function updateStats(effects) {
  const sc = scenarios[state.scenario];
  const popup = document.createElement('div');
  popup.className = 'stat-change-popup';
  document.body.appendChild(popup);

  Object.keys(effects).forEach((key, i) => {
    state.stats[key] = Math.max(0, Math.min(100, state.stats[key] + effects[key]));
    const valEl = document.getElementById(`sv-${key}`);
    const barEl = document.getElementById(`sb-${key}`);
    if (valEl) {
      valEl.textContent = state.stats[key];
      valEl.style.color = effects[key] > 0 ? '#6b8f71' : '#c45c4a';
      setTimeout(() => {
        const stat = sc.stats.find(s => s.key === key);
        if (stat) valEl.style.color = stat.color;
      }, 1200);
    }
    if (barEl) barEl.style.width = state.stats[key] + '%';

    const stat = sc.stats.find(s => s.key === key);
    if (stat && effects[key] !== 0) {
      const item = document.createElement('div');
      item.className = `stat-change-item ${effects[key] > 0 ? 'positive' : 'negative'}`;
      item.textContent = `${stat.label} ${effects[key] > 0 ? '+' : ''}${effects[key]}`;
      item.style.animationDelay = `${i * 0.1}s`;
      popup.appendChild(item);
    }
  });

  setTimeout(() => popup.remove(), 2500);
}

function showResultFlash(text) {
  const flash = document.getElementById('resultFlash');
  flash.textContent = text;
  flash.style.opacity = '1';
  flash.style.transform = 'translate(-50%, -50%) scale(1)';
  setTimeout(() => {
    flash.style.opacity = '0';
    flash.style.transform = 'translate(-50%, -50%) scale(0.95)';
  }, 2500);
}

function renderScene() {
  const sc = scenarios[state.scenario];
  const scene = sc.scenes[state.currentScene];
  const container = document.getElementById('sceneContainer');
  const level = document.getElementById('levelIndicator');
  level.textContent = `${state.currentScene + 1} / ${sc.scenes.length}`;

  container.innerHTML = `
    <div class="scene-chapter" id="sceneChapter">${scene.chapter} · ${scene.title}</div>
    <div class="scene-text" id="sceneText"></div>
    <div class="scene-narrator" id="sceneNarrator"></div>
    <div class="choices-container" id="choicesContainer"></div>
  `;

  const chapterEl = document.getElementById('sceneChapter');
  const textEl = document.getElementById('sceneText');
  const narratorEl = document.getElementById('sceneNarrator');
  const choicesEl = document.getElementById('choicesContainer');

  setTimeout(() => {
    chapterEl.style.opacity = '1';
    chapterEl.style.transform = 'translateY(0)';
    chapterEl.style.transition = 'all 0.8s cubic-bezier(0.23,1,0.32,1)';
  }, 100);

  setTimeout(() => {
    textEl.style.opacity = '1';
    textEl.style.transform = 'translateY(0)';
    textEl.style.transition = 'opacity 0.8s ease, transform 0.8s ease';
    typewriter(textEl, scene.text, () => {
      setTimeout(() => {
        narratorEl.style.opacity = '1';
        narratorEl.style.transform = 'translateY(0)';
        narratorEl.style.transition = 'all 0.8s ease';
        narratorEl.innerHTML = scene.narrator;
      }, 300);

      setTimeout(() => {
        choicesEl.style.opacity = '1';
        choicesEl.style.transform = 'translateY(0)';
        choicesEl.style.transition = 'all 0.8s cubic-bezier(0.23,1,0.32,1)';
        scene.choices.forEach((choice, i) => {
          const btn = document.createElement('button');
          btn.className = 'choice-btn';
          btn.innerHTML = `${choice.text}<span class="choice-hint">${choice.hint}</span>${choice.analysis ? `<div class="deep-analysis" id="analysis-${state.currentScene}-${i}">${choice.analysis}</div>` : ''}`;

          // long press for deep analysis
          let pressTimer = null;
          const showAnalysis = () => {
            pressTimer = setTimeout(() => {
              const el = document.getElementById(`analysis-${state.currentScene}-${i}`);
              if (el) el.classList.add('show');
            }, 800);
          };
          const hideAnalysis = () => { clearTimeout(pressTimer); };
          btn.addEventListener('mousedown', showAnalysis);
          btn.addEventListener('mouseup', hideAnalysis);
          btn.addEventListener('mouseleave', hideAnalysis);
          btn.addEventListener('touchstart', showAnalysis, { passive: true });
          btn.addEventListener('touchend', hideAnalysis);

          btn.style.opacity = '0';
          btn.style.transform = 'translateX(-20px)';
          btn.onclick = () => makeChoice(i);
          choicesEl.appendChild(btn);
          setTimeout(() => {
            btn.style.transition = 'all 0.5s cubic-bezier(0.23,1,0.32,1)';
            btn.style.opacity = '1';
            btn.style.transform = 'translateX(0)';
          }, 200 + i * 150);
        });
      }, 800);
    });
  }, 400);
}

function typewriter(el, text, callback) {
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'typewriter-cursor';
  el.textContent = '';
  el.appendChild(cursor);

  function type() {
    if (i < text.length) {
      if (text[i] === '\n') {
        el.insertBefore(document.createElement('br'), cursor);
      } else {
        el.insertBefore(document.createTextNode(text[i]), cursor);
      }
      i++;
      const ch = text[i-1];
      const speed = ch === '。' ? 120 : ch === '，' ? 80 : ch === '\n' ? 200 : 25 + Math.random() * 20;
      setTimeout(type, speed);
    } else {
      setTimeout(() => { cursor.remove(); if (callback) callback(); }, 500);
    }
  }
  type();
}

function makeChoice(index) {
  const sc = scenarios[state.scenario];
  const scene = sc.scenes[state.currentScene];
  const choice = scene.choices[index];

  state.choices.push({ scene: state.currentScene, choice: index, text: choice.text });
  state.history.push({ ...state.stats });

  // ink splash for ming
  if (state.scenario === 'ming') {
    const splash = document.createElement('div');
    splash.className = 'ink-splash';
    splash.style.left = '50%';
    splash.style.top = '50%';
    document.body.appendChild(splash);
    setTimeout(() => splash.remove(), 2000);
  }

  updateStats(choice.effects);

  // disable buttons
  document.querySelectorAll('.choices-container .choice-btn').forEach(btn => {
    btn.style.pointerEvents = 'none';
    btn.style.opacity = '0.3';
  });

  // show consequence
  const container = document.getElementById('sceneContainer');
  const consequenceEl = document.createElement('div');
  consequenceEl.className = 'consequence-box';
  consequenceEl.innerHTML = `
    <div class="consequence-label">后果</div>
    <div class="consequence-text">${choice.consequence}</div>
  `;
  container.appendChild(consequenceEl);
  setTimeout(() => {
    consequenceEl.style.transition = 'all 0.8s ease';
    consequenceEl.style.opacity = '1';
    consequenceEl.style.transform = 'translateY(0)';
  }, 100);

  // next button
  setTimeout(() => {
    const nextBtn = document.createElement('button');
    nextBtn.className = 'choice-btn';
    nextBtn.style.marginTop = '2rem';
    nextBtn.style.opacity = '0';
    nextBtn.innerHTML = state.currentScene < sc.scenes.length - 1 ? '继续 →' : '查看结局 →';
    nextBtn.onclick = () => {
      const overlay = document.getElementById('transitionOverlay');
      overlay.classList.add('active');
      setTimeout(() => {
        if (state.currentScene < sc.scenes.length - 1) {
          state.currentScene++;
          renderScene();
        } else {
          showEnding();
        }
        setTimeout(() => overlay.classList.remove('active'), 100);
      }, 600);
    };
    container.appendChild(nextBtn);
    setTimeout(() => {
      nextBtn.style.transition = 'all 0.5s ease';
      nextBtn.style.opacity = '1';
    }, 100);
  }, 2000);
}

// ====== ENDING SYSTEM ======
function determineEnding() {
  const sc = scenarios[state.scenario];
  const endings = sc.endings;
  for (const ending of endings) {
    if (ending.condition(state.stats)) return ending;
  }
  return endings[endings.length - 1];
}

function showEnding() {
  showScreen('ending-screen');
  document.getElementById('vignette').classList.remove('active');
  document.getElementById('scanline').classList.remove('active');
  document.getElementById('statsBar').classList.remove('visible');

  const sc = scenarios[state.scenario];
  const ending = determineEnding();

  // unlock ending
  if (!unlockedEndings[state.scenario]) unlockedEndings[state.scenario] = [];
  if (!unlockedEndings[state.scenario].includes(ending.id)) {
    unlockedEndings[state.scenario].push(ending.id);
    localStorage.setItem('unlockedEndings', JSON.stringify(unlockedEndings));
  }

  if (ending.atmosphere === 'confetti') createConfetti();
  if (ending.atmosphere === 'dark') createDarkAtmosphere();

  const screen = document.getElementById('ending-screen');
  screen.innerHTML = `
    <div class="ending-badge">${ending.icon}</div>
    <div class="ending-title glitch-text" data-text="${ending.title}">${ending.title}</div>
    <div class="ending-subtitle">${ending.subtitle}</div>
    <div class="ending-stats">
      ${sc.stats.map(s => `
        <div class="ending-stat">
          <div class="val" style="color:${s.color}">${state.stats[s.key]}</div>
          <div class="lbl">${s.label}</div>
        </div>
      `).join('')}
    </div>
    <div class="ending-verdict">${ending.verdict}</div>
    <div class="ending-analysis">
      <h4>五本书视角解析</h4>
      ${ending.analysis}
    </div>
    <div class="ending-quote">${ending.quote}</div>
    <div class="ending-btns">
      <button class="ending-btn primary" onclick="startGame('${state.scenario}')">再来一次</button>
      <button class="ending-btn" onclick="showScreen('landing')">返回首页</button>
      <button class="ending-btn" onclick="showGallery()">结局图鉴</button>
    </div>
  `;
}

function createConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#c9a96e', '#6b8f71', '#9b8ec4', '#7a8ba0', '#c45c4a'];
  for (let i = 0; i < 80; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDuration = (Math.random() * 3 + 2) + 's';
    c.style.animationDelay = Math.random() * 2 + 's';
    c.style.width = (Math.random() * 8 + 4) + 'px';
    c.style.height = (Math.random() * 8 + 4) + 'px';
    container.appendChild(c);
  }
  setTimeout(() => container.remove(), 6000);
}

function createDarkAtmosphere() {
  const el = document.createElement('div');
  el.className = 'atmosphere-dark';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 5000);
}

// ====== GALLERY ======
function showGallery() {
  showScreen('gallery-screen');
  renderGalleryContent('whitehouse');
}

function renderGalleryContent(tab) {
  const screen = document.getElementById('gallery-screen');
  const sc = scenarios[tab];
  const unlocked = unlockedEndings[tab] || [];
  screen.innerHTML = `
    <div class="gallery-header">
      <h2>结局图鉴</h2>
      <p>已解锁 ${unlocked.length} / ${sc.endings.length} 个结局</p>
    </div>
    <div class="gallery-tabs">
      <button class="gallery-tab ${tab === 'whitehouse' ? 'active' : ''}" onclick="renderGalleryContent('whitehouse')">白宫篇</button>
      <button class="gallery-tab ${tab === 'ming' ? 'active' : ''}" onclick="renderGalleryContent('ming')">明朝篇</button>
    </div>
    <div class="gallery-grid">
      ${sc.endings.map(e => {
        const isUnlocked = unlocked.includes(e.id);
        return `
          <div class="gallery-card ${isUnlocked ? 'unlocked' : 'locked'}">
            <div class="gc-icon">${isUnlocked ? e.icon : '🔒'}</div>
            <div class="gc-title">${isUnlocked ? e.title : '???'}</div>
            <div class="gc-subtitle">${isUnlocked ? e.subtitle : '未解锁'}</div>
            <div class="gc-quote">${isUnlocked ? e.quote : '继续探索以解锁此结局'}</div>
          </div>
        `;
      }).join('')}
    </div>
    <button class="gallery-back" onclick="showScreen('landing')">返回首页</button>
  `;
}

function confirmExit() {
  if (confirm('确定要返回首页吗？当前进度不会保存。')) {
    showScreen('landing');
    document.getElementById('vignette').classList.remove('active');
    document.getElementById('scanline').classList.remove('active');
  }
}

// ====== KEYBOARD SHORTCUTS ======
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    const gs = document.getElementById('game-screen');
    if (gs.classList.contains('active')) confirmExit();
  }
});
