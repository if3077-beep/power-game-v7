<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiroFish · 未来推演 v9</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23c9a96e'/><circle cx='16' cy='16' r='6' fill='%230a0a0a'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 背景层 -->
  <canvas id="bgCanvas"></canvas>
  <div class="scanline" id="scanline"></div>
  <div class="vignette"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <div class="app">
    <!-- ===== 输入阶段 ===== -->
    <section id="phaseInput" class="phase active">
      <div class="phase-inner">
        <header class="header">
          <div class="logo-mark">
            <div class="logo-orb"></div>
            <div class="logo-ring"></div>
            <div class="logo-ring ring-2"></div>
          </div>
          <h1 class="title">
            <span class="title-line">未来推演</span>
            <span class="title-sub">告诉我你的处境，我用三条路径推演你的未来</span>
          </h1>
        </header>

        <div class="daily-inspiration" id="dailyInspiration">
          <div class="inspiration-icon">D</div>
          <div>
            <div class="inspiration-text" id="inspirationText">加载中...</div>
            <div class="inspiration-author" id="inspirationAuthor"></div>
          </div>
        </div>

        <div class="scene-carousel">
          <div class="scene-track" id="sceneTrack">
            <button class="scene-card" data-text="我最近在纠结要不要跳槽，现在的工作稳定但没激情" data-mood="confused">
              <div class="scene-icon">C</div>
              <div class="scene-title">职业十字路口</div>
              <div class="scene-desc">稳定 vs 激情</div>
            </button>
            <button class="scene-card" data-text="和对象吵架了，冷战三天了，不知道该不该先低头" data-mood="sad">
              <div class="scene-icon">H</div>
              <div class="scene-title">感情僵局</div>
              <div class="scene-desc">冷战第三天</div>
            </button>
            <button class="scene-card" data-text="公司要裁员，人心惶惶，不知道自己安不安全" data-mood="anxious">
              <div class="scene-icon">W</div>
              <div class="scene-title">职场风暴</div>
              <div class="scene-desc">裁员传闻四起</div>
            </button>
            <button class="scene-card" data-text="想创业，但不确定时机对不对，怕失败" data-mood="anxious">
              <div class="scene-icon">R</div>
              <div class="scene-title">创业抉择</div>
              <div class="scene-desc">梦想 vs 现实</div>
            </button>
            <button class="scene-card" data-text="AI 技术发展太快了，感觉自己的技能要被淘汰了" data-mood="fearful">
              <div class="scene-icon">A</div>
              <div class="scene-title">AI 时代焦虑</div>
              <div class="scene-desc">会被取代吗</div>
            </button>
            <button class="scene-card" data-text="投资的股票连续跌了一周，要不要割肉" data-mood="anxious">
              <div class="scene-icon">S</div>
              <div class="scene-title">投资焦虑</div>
              <div class="scene-desc">割肉还是坚守</div>
            </button>
            <button class="scene-card" data-text="孩子要高考了，全家压力都很大" data-mood="anxious">
              <div class="scene-icon">E</div>
              <div class="scene-title">高考倒计时</div>
              <div class="scene-desc">全家总动员</div>
            </button>
            <button class="scene-card" data-text="想搬家/换城市生活，但不确定新环境会怎样" data-mood="hopeful">
              <div class="scene-icon">M</div>
              <div class="scene-title">城市迁徙</div>
              <div class="scene-desc">新城市新生活</div>
            </button>
            <button class="scene-card" data-text="身体检查出一些问题，很担心" data-mood="fearful">
              <div class="scene-icon">P</div>
              <div class="scene-title">健康警报</div>
              <div class="scene-desc">体检异常</div>
            </button>
            <button class="scene-card" data-text="想做自媒体副业，但不知道能不能做起来" data-mood="hopeful">
              <div class="scene-icon">V</div>
              <div class="scene-title">副业探索</div>
              <div class="scene-desc">第二曲线</div>
            </button>
            <button class="scene-card" data-text="信用卡欠了好几万，每个月都在拆东墙补西墙" data-mood="anxious">
              <div class="scene-icon">D</div>
              <div class="scene-title">债务漩涡</div>
              <div class="scene-desc">越还越多</div>
            </button>
            <button class="scene-card" data-text="和父母因为催婚大吵了一架，现在关系很僵" data-mood="angry">
              <div class="scene-icon">F</div>
              <div class="scene-title">家庭冲突</div>
              <div class="scene-desc">催婚风暴</div>
            </button>
          </div>
        </div>

        <div class="input-container">
          <div class="input-glow"></div>
          <textarea id="userInput" placeholder="试着这样写：我在考虑要不要接手家族生意，但怕做不好；或者：最近总失眠，工作压力大到喘不过气..." rows="4"></textarea>
          <div class="input-bar">
            <div class="mood-mini" id="moodMini">
              <button class="mood-chip" data-mood="anxious">焦虑</button>
              <button class="mood-chip" data-mood="angry">愤怒</button>
              <button class="mood-chip" data-mood="sad">难过</button>
              <button class="mood-chip" data-mood="confused">迷茫</button>
              <button class="mood-chip" data-mood="hopeful">期待</button>
              <button class="mood-chip" data-mood="fearful">恐惧</button>
              <button class="mood-chip" data-mood="neutral">平静</button>
              <button class="mood-chip" data-mood="excited">兴奋</button>
            </div>
            <div style="display:flex;gap:6px;align-items:center;">
              <button id="btnRandomDilemma" class="btn-random-dilemma">随机困境</button>
              <button id="btnNext" class="btn-glow" disabled>
                <span>推演未来</span>
                <div class="btn-shine"></div>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== 校准阶段 ===== -->
    <section id="phaseCalibrate" class="phase">
      <div class="phase-inner">
        <div class="phase-nav">
          <button id="btnBack" class="btn-ghost">&larr; 返回</button>
          <h2>校准推演参数</h2>
          <div></div>
        </div>

        <div class="keyword-cloud" id="keywordCloud"></div>

        <div class="slider-stack">
          <div class="slider-row">
            <div class="slider-info">
              <span class="slider-label">影响范围</span>
              <span class="slider-val" id="valScope">身边几个人</span>
            </div>
            <input type="range" id="slScope" min="1" max="5" value="2" class="range-slider">
            <div class="slider-range"><span>仅自己</span><span>全社会</span></div>
          </div>
          <div class="slider-row">
            <div class="slider-info">
              <span class="slider-label">情绪强度</span>
              <span class="slider-val" id="valIntensity">中等</span>
            </div>
            <input type="range" id="slIntensity" min="1" max="5" value="3" class="range-slider">
            <div class="slider-range"><span>平静</span><span>激烈</span></div>
          </div>
          <div class="slider-row">
            <div class="slider-info">
              <span class="slider-label">时间跨度</span>
              <span class="slider-val" id="valTime">一个月</span>
            </div>
            <input type="range" id="slTime" min="1" max="5" value="3" class="range-slider">
            <div class="slider-range"><span>一周</span><span>一年</span></div>
          </div>
          <div class="slider-row">
            <div class="slider-info">
              <span class="slider-label">不确定性</span>
              <span class="slider-val" id="valUncertainty">中等</span>
            </div>
            <input type="range" id="slUncertainty" min="1" max="5" value="3" class="range-slider">
            <div class="slider-range"><span>确定</span><span>完全未知</span></div>
          </div>
        </div>

        <div class="factors-wrap">
          <p class="factors-title">还有哪些相关因素？</p>
          <div class="factor-grid" id="factorGrid">
            <button class="factor-chip" data-factor="media">社交媒体放大</button>
            <button class="factor-chip" data-factor="authority">权威介入</button>
            <button class="factor-chip" data-factor="peer">同辈压力</button>
            <button class="factor-chip" data-factor="money">经济因素</button>
            <button class="factor-chip" data-factor="time">时间紧迫</button>
            <button class="factor-chip" data-factor="reputation">面子/声誉</button>
            <button class="factor-chip" data-factor="health">健康相关</button>
            <button class="factor-chip" data-factor="family">家庭牵扯</button>
          </div>
        </div>

        <div class="phase-footer">
          <button id="btnStart" class="btn-glow large">
            <span>开始三路径推演</span>
            <div class="btn-shine"></div>
          </button>
        </div>
      </div>
    </section>

    <!-- ===== 推演阶段 ===== -->
    <section id="phaseSimulate" class="phase">
      <div class="phase-inner">
        <div class="sim-bar">
          <div class="sim-status">
            <div class="pulse-dot"></div>
            <span id="simLabel">推演中</span>
          </div>
          <div class="sim-engine" id="simEngine">本地引擎</div>
        </div>

        <div class="empathy-section" id="empathySection">
          <div class="empathy-icon">E</div>
          <div class="empathy-text" id="empathyText"></div>
        </div>

        <div class="sim-progress">
          <div class="sim-progress-bar" id="simProgressBar"></div>
        </div>
        <div class="sim-steps" id="simSteps"></div>

        <!-- 加载洞察轮播 -->
        <div class="loading-insights" id="loadingInsights"></div>
      </div>
    </section>

    <!-- ===== 结果阶段 ===== -->
    <section id="phaseResult" class="phase">
      <div class="phase-inner">
        <!-- 解析洞察 -->
        <div class="parsed-insights" id="parsedInsights"></div>

        <!-- 共鸣总结 -->
        <div class="result-empathy" id="resultEmpathy">
          <div class="empathy-avatar">E</div>
          <div class="empathy-bubble" id="empathyBubble"></div>
        </div>

        <!-- 分析引擎结果区 -->
        <div class="analysis-section" id="analysisSection">
          <!-- 由 app.js 的 renderAnalysis() 动态填充 -->
        </div>

        <!-- 三路径标题 -->
        <div class="paths-header">
          <h2 class="paths-title">三条推演路径</h2>
          <p class="paths-sub">基于你的处境，以下是三种可能的走向</p>
        </div>

        <!-- 三路径卡片 -->
        <div class="paths-grid" id="pathsGrid">
          <div class="path-card path-optimistic">
            <div class="path-header">
              <div class="path-icon path-icon-up">U</div>
              <h3 class="path-name">乐观路径</h3>
              <div class="path-prob" id="probOptimistic"></div>
              <button class="btn-twist" id="twistOptimistic" title="毒舌转折">!</button>
            </div>
            <div class="path-body" id="pathOptimistic"></div>
          </div>

          <div class="path-card path-neutral">
            <div class="path-header">
              <div class="path-icon path-icon-mid">N</div>
              <h3 class="path-name">中性路径</h3>
              <div class="path-prob" id="probNeutral"></div>
              <button class="btn-twist" id="twistNeutral" title="毒舌转折">!</button>
            </div>
            <div class="path-body" id="pathNeutral"></div>
          </div>

          <div class="path-card path-pessimistic">
            <div class="path-header">
              <div class="path-icon path-icon-down">D</div>
              <h3 class="path-name">悲观路径</h3>
              <div class="path-prob" id="probPessimistic"></div>
              <button class="btn-twist" id="twistPessimistic" title="毒舌转折">!</button>
            </div>
            <div class="path-body" id="pathPessimistic"></div>
          </div>
        </div>

        <!-- 统计数据 -->
        <div class="section-block">
          <h3 class="section-title">真实数据</h3>
          <div class="stats-grid" id="statsGrid"></div>
        </div>

        <!-- 行动建议 -->
        <div class="section-block">
          <h3 class="section-title">行动建议</h3>
          <div class="advice-list" id="adviceList"></div>
        </div>

        <!-- 三联阅读卡片 -->
        <div class="section-block">
          <h3 class="section-title">延伸阅读</h3>
          <div class="reading-cards" id="readingCards"></div>
        </div>

        <!-- 心理学洞察 -->
        <div class="section-block">
          <h3 class="section-title">心理学洞察</h3>
          <div class="insight-card" id="insightCard"></div>
        </div>

        <!-- 决策日志 -->
        <div class="section-block">
          <h3 class="section-title">决策日志</h3>
          <div class="journal-list" id="journalList"></div>
        </div>

        <!-- 操作栏 -->
        <div class="action-row">
          <button id="btnExport" class="btn-ghost">截图保存</button>
          <button id="btnShare" class="btn-ghost">复制分享</button>
          <button id="btnAudioToggle" class="btn-ghost">音效: 开</button>
          <button id="btnNew" class="btn-glow">新推演</button>
        </div>

        <!-- 免责声明 -->
        <div class="disclaimer">
          <div class="disclaimer-text">推演基于你的输入生成，不构成现实建议</div>
        </div>
      </div>
    </section>
  </div>

  <script src="data.js"></script>
  <script src="engine.js"></script>
  <script src="audio.js"></script>
  <script src="app.js"></script>
</body>
</html>
