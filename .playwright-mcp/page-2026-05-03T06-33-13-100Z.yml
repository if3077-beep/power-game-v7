      - generic [ref=e52]:
        - generic [ref=e53]:
          - heading "1. Android手机上可以用吗？" [level=4] [ref=e54]
          - paragraph [ref=e55]: 可以的，Android手机在常用的Chrome、UC、360、QQ等浏览器上都可以很方便的使用本站。推荐使用Chrome浏览器获得最佳下载体验。
        - generic [ref=e56]:
          - heading "2. iOS设备（iPhone、iPad、iPod）上点击下载视频按钮后，跳转到视频页面，并没有直接下载，怎么办？" [level=4] [ref=e57]
          - paragraph [ref=e58]:
            - text: "因Safari及微信内置浏览器均不支持下载文件，所以保存视频需要借助第三方App来完成下载，建议iOS用户在App Store下载免费的Documents 6，然后在Documents的内置浏览器中使用本站，可以完美下载视频，并且Documents支持将下载的视频移到手机相册。参考:"
            - link "iPhone上利用Documents下载和管理视频教程" [ref=e59] [cursor=pointer]:
              - /url: https://www.iiilab.com/article/773264366
        - generic [ref=e60]:
          - heading "3. 我在电脑上用的是IE浏览器，点下载视频按钮后，出现跟上面那用iPad的哥们一样的情况，跳转到视频页面，如何下载到本地呢？" [level=4] [ref=e61]
          - paragraph [ref=e62]: 本站不支持IE浏览器。电脑上少数浏览器不支持直接下载，但可以在下载视频按钮上点击右键，然后选择"目标另存为"或"链接存储为"来下载视频；或者到跳转后的视频页面，在视频画面上点击右键，然后选择"视频另存为"来下载视频。当然，我们更推荐在电脑上使用如谷歌Chrome浏览器、360浏览器极速模式、QQ浏览器极速模式等现代浏览器来获得最佳上网体验。
        - generic [ref=e63]:
          - heading "4. 下载后的视频打不开怎么办？" [level=4] [ref=e64]
          - paragraph [ref=e65]: 这种情况极少发生，一般是文件后缀问题，把下载后的文件后缀名改为.mp4即可播放。
